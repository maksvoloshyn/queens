name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    verify:
        name: Verify Code Quality & Tests
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 26
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Check code formatting
              run: npx prettier --check .

            - name: Run linter
              run: npm run lint

            - name: Run unit tests
              run: npm run test

            - name: Verify build compilation
              run: npm run build
